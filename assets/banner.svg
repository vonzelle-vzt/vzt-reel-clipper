<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0c0f"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.15" r="0.7">
      <stop offset="0" stop-color="#e6b422" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#e6b422" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4d469"/>
      <stop offset="0.5" stop-color="#e6b422"/>
      <stop offset="1" stop-color="#c9920f"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#glow)"/>
  <rect x="0" y="0" width="1280" height="6" fill="url(#gold)"/>

  <!-- ===== Left: text ===== -->
  <text x="80" y="92" fill="#e6b422" font-size="20" font-weight="700" letter-spacing="6">VZT&#160;&#160;TOOLS</text>

  <text x="78" y="172" font-size="74" font-weight="800" letter-spacing="-1">
    <tspan fill="url(#gold)">vzt-</tspan><tspan fill="#ffffff">reel-clipper</tspan>
  </text>

  <text x="82" y="222" fill="#c8c8d0" font-size="27" font-weight="500">Turn 1 longform video into N captioned vertical shorts.</text>

  <!-- mode pills -->
  <g>
    <rect x="82" y="252" width="184" height="46" rx="23" fill="none" stroke="#e6b422" stroke-width="2"/>
    <text x="106" y="281" fill="#f4d469" font-size="20" font-weight="700">&#9656; speech mode</text>
    <rect x="282" y="252" width="178" height="46" rx="23" fill="none" stroke="#e6b422" stroke-width="2"/>
    <text x="306" y="281" fill="#f4d469" font-size="20" font-weight="700">&#9656; sports mode</text>
  </g>

  <text x="84" y="344" fill="#7c7c88" font-size="19" font-weight="500" letter-spacing="0.5">local&#160;&#160;&#183;&#160;&#160;no paid API&#160;&#160;&#183;&#160;&#160;ffmpeg + claude + whisper</text>

  <!-- ===== Right: longform -> shorts motif ===== -->
  <g transform="translate(792,118)">
    <!-- landscape source frame (16:9) -->
    <rect x="0" y="22" width="150" height="84" rx="8" fill="#15151b" stroke="#33333e" stroke-width="2"/>
    <polygon points="58,46 58,82 92,64" fill="url(#gold)"/>
    <text x="0" y="128" fill="#6a6a76" font-size="14" font-weight="600">longform</text>

    <!-- arrow -->
    <g stroke="url(#gold)" stroke-width="4" fill="none" stroke-linecap="round">
      <line x1="166" y1="64" x2="208" y2="64"/>
      <polyline points="196,52 210,64 196,76"/>
    </g>

    <!-- three vertical 9:16 clips -->
    <g>
      <!-- clip 1 -->
      <rect x="232" y="0" width="74" height="128" rx="9" fill="#15151b" stroke="#3a3a46" stroke-width="2"/>
      <rect x="244" y="96" width="34" height="9" rx="4" fill="#ffffff"/>
      <rect x="244" y="109" width="50" height="9" rx="4" fill="url(#gold)"/>
      <!-- clip 2 (front, highlighted) -->
      <rect x="320" y="-8" width="80" height="140" rx="10" fill="#1b1b22" stroke="#e6b422" stroke-width="2.5"/>
      <polygon points="350,52 350,80 376,66" fill="#ffffff" opacity="0.9"/>
      <rect x="334" y="98" width="40" height="10" rx="5" fill="#ffffff"/>
      <rect x="334" y="113" width="56" height="10" rx="5" fill="url(#gold)"/>
      <!-- clip 3 -->
      <rect x="414" y="0" width="74" height="128" rx="9" fill="#15151b" stroke="#3a3a46" stroke-width="2"/>
      <rect x="426" y="96" width="46" height="9" rx="4" fill="#ffffff"/>
      <rect x="426" y="109" width="30" height="9" rx="4" fill="url(#gold)"/>
    </g>
    <text x="232" y="150" fill="#6a6a76" font-size="14" font-weight="600">vertical shorts + captions</text>
  </g>
</svg>
